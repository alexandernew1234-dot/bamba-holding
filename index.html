<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bamba — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #07070D;
    --bg-night: #060B18;
    --text: #E8EAF0;
    --text-dim: #4A4A5A;
    --accent: #C84A10;
    --accent-warm: #E8735A;
    --accent-cool: #A0B4CC;
    --surface: #0A0A14;
  }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Background atmosphere */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(200, 74, 16, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 60% at 80% 30%, rgba(160, 180, 204, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse 80% 80% at 50% 100%, rgba(6, 11, 24, 0.8) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* Subtle grid texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,234,240,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,234,240,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
    padding: 40px 24px;
  }

  /* Logo */
  .logo-wrap {
    margin-bottom: 36px;
    animation: logoIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .logo-svg {
    width: 90px;
    height: 90px;
    filter: drop-shadow(0 0 32px rgba(200, 74, 16, 0.4)) drop-shadow(0 0 8px rgba(200, 74, 16, 0.3));
    animation: pulse 4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 32px rgba(200, 74, 16, 0.4)) drop-shadow(0 0 8px rgba(200, 74, 16, 0.3)); }
    50% { filter: drop-shadow(0 0 48px rgba(200, 74, 16, 0.6)) drop-shadow(0 0 16px rgba(200, 74, 16, 0.4)); }
  }

  /* Wordmark */
  .wordmark {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    font-size: clamp(42px, 8vw, 72px);
    letter-spacing: 0.35em;
    color: var(--text);
    text-transform: uppercase;
    margin-bottom: 6px;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
    position: relative;
  }

  .wordmark span {
    color: var(--accent);
  }

  /* Divider line */
  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 20px auto 20px;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.35s both;
  }

  /* Coming Soon */
  .coming-soon {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: clamp(10px, 1.5vw, 12px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--accent-warm);
    margin-bottom: 24px;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.45s both;
  }

  /* Tagline */
  .tagline {
    font-size: clamp(14px, 2vw, 17px);
    font-weight: 300;
    color: var(--text-dim);
    letter-spacing: 0.04em;
    line-height: 1.7;
    max-width: 420px;
    margin-bottom: 48px;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.55s both;
  }

  /* Contact */
  .contact-wrap {
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
  }

  .contact-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #2A2A38;
    margin-bottom: 10px;
  }

  .contact-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border: 1px solid rgba(200, 74, 16, 0.25);
    border-radius: 3px;
    color: var(--accent-warm);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    transition: all 0.3s ease;
    background: rgba(200, 74, 16, 0.04);
    position: relative;
    overflow: hidden;
  }

  .contact-link::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(200,74,16,0.1), transparent);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .contact-link:hover {
    border-color: rgba(200, 74, 16, 0.6);
    color: var(--text);
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(200, 74, 16, 0.15);
  }

  .contact-link:hover::before {
    opacity: 1;
  }

  .contact-icon {
    width: 14px;
    height: 14px;
    opacity: 0.7;
  }

  /* Footer */
  .footer {
    position: fixed;
    bottom: 28px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #1E1E28;
    animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 1s both;
    z-index: 1;
  }

  .footer-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #1E1E28;
  }

  /* Floating orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .orb-1 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(200,74,16,0.06) 0%, transparent 70%);
    top: -100px; left: -100px;
    animation: orbFloat1 12s ease-in-out infinite;
  }

  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(160,180,204,0.04) 0%, transparent 70%);
    bottom: -150px; right: -100px;
    animation: orbFloat2 15s ease-in-out infinite;
  }

  @keyframes orbFloat1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(40px, 30px); }
  }

  @keyframes orbFloat2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-30px, -40px); }
  }

  @keyframes logoIn {
    from { opacity: 0; transform: scale(0.8) translateY(20px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Ray animation */
  .ray {
    animation: rayPulse 3s ease-in-out infinite;
    transform-origin: 50px 50px;
  }

  @keyframes rayPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="container">

  <!-- Logo -->
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Rays -->
      <line class="ray" x1="50" y1="24" x2="50" y2="5" stroke="#C84A10" stroke-width="3.5" stroke-linecap="round"/>
      <line class="ray" x1="76" y1="50" x2="95" y2="50" stroke="#C84A10" stroke-width="3.5" stroke-linecap="round"/>
      <line class="ray" x1="50" y1="76" x2="50" y2="93" stroke="#C84A10" stroke-width="3" stroke-linecap="round"/>
      <line class="ray" x1="24" y1="50" x2="5" y2="50" stroke="#C84A10" stroke-width="3.5" stroke-linecap="round"/>
      <line class="ray" x1="68.4" y1="31.6" x2="82" y2="18" stroke="#C84A10" stroke-width="2.5" stroke-linecap="round"/>
      <line class="ray" x1="31.6" y1="31.6" x2="18" y2="18" stroke="#C84A10" stroke-width="2.5" stroke-linecap="round"/>
      <line class="ray" x1="68.4" y1="68.4" x2="79" y2="79" stroke="#C84A10" stroke-width="2" stroke-linecap="round"/>
      <line class="ray" x1="31.6" y1="68.4" x2="21" y2="79" stroke="#C84A10" stroke-width="2" stroke-linecap="round"/>
      <!-- Disc -->
      <circle cx="50" cy="50" r="26" fill="#C84A10"/>
      <!-- B -->
      <text x="50" y="53.5" text-anchor="middle" dominant-baseline="middle"
        font-family="Raleway,sans-serif" font-weight="800" font-size="30" fill="white">B</text>
    </svg>
  </div>

  <!-- Wordmark -->
  <div class="wordmark">BAMBA</div>

  <div class="divider"></div>

  <!-- Coming Soon -->
  <div class="coming-soon">Coming Soon</div>

  <!-- Tagline -->
  <p class="tagline">The next generation social platform.<br>Built for how you connect today.</p>

  <!-- Contact -->
  <div class="contact-wrap">
    <div class="contact-label">Get in touch</div>
    <a href="mailto:alex@bamba.chat" class="contact-link">
      <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m2 7 10 7 10-7"/>
      </svg>
      alex@bamba.chat
    </a>
  </div>

</div>

<div class="footer">
  <span>Bamba</span>
  <span class="footer-dot"></span>
  <span>bamba.chat</span>
  <span class="footer-dot"></span>
  <span>UK</span>
</div>

</body>
</html>
