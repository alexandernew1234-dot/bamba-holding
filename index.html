<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bamba — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@800;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    animation: bgTransition 8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s both;
  }

  @keyframes bgTransition {
    0%   { background: #07070D; }
    30%  { background: #150804; }
    65%  { background: #EED8BC; }
    100% { background: #FAF4EC; }
  }

  .horizon {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 70%;
    pointer-events: none;
    z-index: 0;
    animation: horizonGlow 8s cubic-bezier(0.4, 0, 0.2, 1) 0.5s both;
  }

  @keyframes horizonGlow {
    0%   { background: radial-gradient(ellipse 90% 55% at 50% 100%, rgba(200,74,16,0.00) 0%, transparent 70%); }
    30%  { background: radial-gradient(ellipse 90% 55% at 50% 100%, rgba(200,74,16,0.55) 0%, transparent 70%); }
    65%  { background: radial-gradient(ellipse 90% 55% at 50% 100%, rgba(200,74,16,0.20) 0%, transparent 70%); }
    100% { background: radial-gradient(ellipse 90% 55% at 50% 100%, rgba(200,74,16,0.06) 0%, transparent 70%); }
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,234,240,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,234,240,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
    animation: gridFade 5s ease 1s both;
  }

  @keyframes gridFade {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 24px;
  }

  /* 
    letter-spacing: 0.35em adds spacing AFTER each of the 5 letters.
    This shifts the optical centre of "BAMBA" left by half of one letter-spacing unit.
    At ~72px font-size, 0.35em ≈ 25px per gap, so we nudge logo left by ~12-13px
    to re-centre visually over the M.
    We use translateX(-0.175em) relative to the wordmark font size via a CSS variable.
  */
  .logo-wrap {
    position: relative;
    width: 90px;
    height: 90px;
    margin-bottom: 18px;
    z-index: 2;
    /* Shift left by half a letter-spacing to optically centre over M */
    transform: translateX(-0.175em);
    font-size: clamp(42px, 8vw, 72px); /* matches wordmark so em unit is correct */
    animation: logoRise 5s cubic-bezier(0.16, 1, 0.3, 1) 0.8s both;
  }

  @keyframes logoRise {
    0%   { transform: translateX(-0.175em) translateY(110px); opacity: 0; }
    12%  { opacity: 1; }
    100% { transform: translateX(-0.175em) translateY(0px);   opacity: 1; }
  }

  .logo-svg {
    width: 90px;
    height: 90px;
    animation: logoGlow 8s cubic-bezier(0.4, 0, 0.2, 1) 0.8s both;
  }

  @keyframes logoGlow {
    0%   { filter: drop-shadow(0 0 0px    rgba(200,74,16,0.0)); }
    20%  { filter: drop-shadow(0 0 56px   rgba(200,74,16,1.0)) drop-shadow(0 0 24px rgba(255,130,50,0.9)); }
    50%  { filter: drop-shadow(0 0 32px   rgba(200,74,16,0.6)) drop-shadow(0 0 10px rgba(200,74,16,0.4)); }
    100% { filter: drop-shadow(0 2px 14px rgba(200,74,16,0.22)); }
  }

  .ray { transform-origin: 50px 50px; opacity: 0; }
  .ray-1 { animation: rayAppear 0.6s ease 2.2s forwards; }
  .ray-2 { animation: rayAppear 0.6s ease 2.4s forwards; }
  .ray-3 { animation: rayAppear 0.6s ease 2.6s forwards; }
  .ray-4 { animation: rayAppear 0.6s ease 2.2s forwards; }
  .ray-5 { animation: rayAppear 0.6s ease 2.8s forwards; }
  .ray-6 { animation: rayAppear 0.6s ease 2.8s forwards; }
  .ray-7 { animation: rayAppear 0.6s ease 3.0s forwards; }
  .ray-8 { animation: rayAppear 0.6s ease 3.0s forwards; }

  @keyframes rayAppear {
    from { opacity: 0; transform: scale(0.5); }
    to   { opacity: 1; transform: scale(1); }
  }

  .wordmark-wrap {
    position: relative;
    z-index: 2;
  }

  .wordmark {
    font-family: 'Raleway', sans-serif;
    font-weight: 900;
    font-size: clamp(42px, 8vw, 72px);
    letter-spacing: 0.35em;
    text-transform: uppercase;
    animation: wordmarkAppear 1.2s ease 0.6s both, wordmarkColor 8s cubic-bezier(0.4,0,0.2,1) 0.5s both;
  }

  @keyframes wordmarkAppear {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes wordmarkColor {
    0%   { color: #E8EAF0; }
    28%  { color: #E8EAF0; }
    100% { color: #C84A10; }
  }

  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #C84A10, transparent);
    margin: 22px auto 20px;
    opacity: 0;
    animation: fadeUp 1s ease 5.5s forwards;
  }

  .coming-soon {
    font-family: 'Raleway', sans-serif;
    font-weight: 800;
    font-size: clamp(10px, 1.5vw, 12px);
    letter-spacing: 0.5em;
    text-transform: uppercase;
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeUp 1s ease 5.8s forwards, comingSoonColor 8s cubic-bezier(0.4,0,0.2,1) 0.5s both;
  }

  @keyframes comingSoonColor {
    0%   { color: #E8735A; }
    100% { color: #B03A08; }
  }

  .tagline {
    font-size: clamp(14px, 2vw, 16px);
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1.8;
    max-width: 400px;
    margin-bottom: 44px;
    opacity: 0;
    animation: fadeUp 1s ease 6.1s forwards, taglineColor 8s cubic-bezier(0.4,0,0.2,1) 0.5s both;
  }

  @keyframes taglineColor {
    0%   { color: #3A3A4A; }
    100% { color: #8A7A6A; }
  }

  .contact-wrap {
    opacity: 0;
    animation: fadeUp 1s ease 6.4s forwards;
  }

  .contact-label {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 10px;
    animation: contactLabelColor 8s cubic-bezier(0.4,0,0.2,1) 0.5s both;
  }

  @keyframes contactLabelColor {
    0%   { color: #2A2A38; }
    100% { color: #B09080; }
  }

  .contact-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border: 1px solid rgba(200,74,16,0.3);
    border-radius: 3px;
    color: #B03A08;
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.08em;
    background: rgba(200,74,16,0.05);
    transition: all 0.3s ease;
  }

  .contact-link:hover {
    background: rgba(200,74,16,0.1);
    border-color: rgba(200,74,16,0.5);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(200,74,16,0.12);
  }

  .contact-icon { width: 14px; height: 14px; opacity: 0.7; }

  .footer {
    position: fixed;
    bottom: 28px;
    left: 0; right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    z-index: 1;
    opacity: 0;
    animation: fadeUp 1s ease 6.8s forwards, footerColor 8s cubic-bezier(0.4,0,0.2,1) 0.5s both;
  }

  @keyframes footerColor {
    0%   { color: #1E1E28; }
    100% { color: #C0A898; }
  }

  .footer-dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

</style>
</head>
<body>

<div class="horizon"></div>

<div class="container">

  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <line class="ray ray-1" x1="50" y1="24" x2="50" y2="5"    stroke="#C84A10" stroke-width="3.5" stroke-linecap="round"/>
      <line class="ray ray-2" x1="76" y1="50" x2="95" y2="50"   stroke="#C84A10" stroke-width="3.5" stroke-linecap="round"/>
      <line class="ray ray-3" x1="50" y1="76" x2="50" y2="93"   stroke="#C84A10" stroke-width="3"   stroke-linecap="round"/>
      <line class="ray ray-4" x1="24" y1="50" x2="5"  y2="50"   stroke="#C84A10" stroke-width="3.5" stroke-linecap="round"/>
      <line class="ray ray-5" x1="68.4" y1="31.6" x2="82" y2="18"  stroke="#C84A10" stroke-width="2.5" stroke-linecap="round"/>
      <line class="ray ray-6" x1="31.6" y1="31.6" x2="18" y2="18"  stroke="#C84A10" stroke-width="2.5" stroke-linecap="round"/>
      <line class="ray ray-7" x1="68.4" y1="68.4" x2="79" y2="79"  stroke="#C84A10" stroke-width="2"   stroke-linecap="round"/>
      <line class="ray ray-8" x1="31.6" y1="68.4" x2="21" y2="79"  stroke="#C84A10" stroke-width="2"   stroke-linecap="round"/>
      <circle cx="50" cy="50" r="26" fill="#C84A10"/>
      <text x="50" y="53.5" text-anchor="middle" dominant-baseline="middle"
        font-family="Raleway,sans-serif" font-weight="800" font-size="30" fill="white">B</text>
    </svg>
  </div>

  <div class="wordmark-wrap">
    <div class="wordmark">BAMBA</div>
  </div>

  <div class="divider"></div>
  <div class="coming-soon">Coming Soon</div>
  <p class="tagline">The next generation social platform.<br>Built for how you connect today.</p>

  <div class="contact-wrap">
    <div class="contact-label">Get in touch</div>
    <a href="mailto:alex@bamba.chat" class="contact-link">
      <svg class="contact-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="2" y="4" width="20" height="16" rx="2"/>
        <path d="m2 7 10 7 10-7"/>
      </svg>
      alex@bamba.chat
    </a>
  </div>

</div>

<div class="footer">
  <span>Bamba</span>
  <span class="footer-dot"></span>
  <span>bamba.chat</span>
  <span class="footer-dot"></span>
  <span>UK</span>
</div>

</body>
</html>
